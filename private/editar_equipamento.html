<!DOCTYPE html> <!-- informa que este é um documento HTML5  -->
<html lang="pt"> <!-- define o início do documento HTML, indicando que o idioma principal da página é português -->

<head> <!-- informações sobre a página (título, metadados, links) -->
    <meta charset="UTF-8"> <!-- define a codificação de caracteres para UTF-8 (acentos e caracteres especiais) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- torna a página responsiva (ajuste a diferentes tamanhos de ecrã) -->

    <title>Editar Equipamento</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome: biblioteca usada para apresentar ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS próprio -->
    <link rel="stylesheet" href="../assets/css/1241466.css">
</head>

<body class="pagina-privada">

    <!-- Navbar da área privada -->
    <header class="navbar-privada">

        <div class="logo-privada">
            <img src="../assets/imagens/LOGO.png" alt="Logótipo MediVault" class="logo-navbar-privada">
            <span class="nome-navbar-privada">MediVault</span>
        </div>

        <div class="dropdown-utilizador-privado">
            <button class="utilizador-privado" type="button">
                <i class="fa-regular fa-user"></i>
                <span>Profissional de saúde</span>
                <i class="fa-solid fa-caret-down"></i>
            </button>

            <div class="menu-utilizador-privado">
                <a href="alterar_password.html">
                    <i class="fa-solid fa-key"></i>
                    Alterar password
                </a>

                <a href="../public/index.html">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Sair
                </a>
            </div>
        </div>

    </header>

    <div class="layout-privado">

        <!-- Menu lateral da área privada -->
        <aside class="menu-lateral-privada">
            <h2>Menu</h2>

            <nav>
                <a href="equipamentos.html" class="ativo">
                    <i class="fa-solid fa-stethoscope"></i>
                    Equipamentos
                </a>

                <a href="fornecedores.html">
                    <i class="fa-solid fa-truck-medical"></i>
                    Fornecedores
                </a>

                <a href="localizacoes.html">
                    <i class="fa-solid fa-location-dot"></i>
                    Localizações
                </a>

                <a href="documentacao.html">
                    <i class="fa-solid fa-file-medical"></i>
                    Documentação
                </a>

                <a href="gestao_conteudos.html">
                    <i class="fa-solid fa-pen-to-square"></i>
                    Gestão de Conteúdos
                </a>

                <a href="dashboard.html">
                    <i class="fa-solid fa-chart-line"></i>
                    Dashboard
                </a>

            </nav>
        </aside>

        <!-- Conteúdo principal -->
        <main class="conteudo-privado">

            <section class="formulario-privado">

                <div class="cabecalho-formulario-privado">
                    <h1>
                        <i class="fa-solid fa-pen-to-square"></i>
                        Editar equipamento
                    </h1>
                </div>

                <hr>

                <form id="form-editar-equipamento" class="form-editar-equipamento-privado">

                    <div class="mb-3">
                        <label for="codigo" class="form-label">Código interno de inventário</label>
                        <input type="text" class="form-control campo-formulario-privado" id="codigo" name="codigo"
                            value="EQ001" readonly required>
                    </div>

                    <div class="mb-3">
                        <label for="designacao" class="form-label">Designação do equipamento</label>
                        <input type="text" class="form-control campo-formulario-privado" id="designacao"
                            name="designacao" value="Monitor multiparamétrico de sinais vitais" required>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="categoria" class="form-label">Categoria ou grupo</label>
                            <select class="form-select campo-formulario-privado" id="categoria" name="categoria"
                                required>
                                <option value="">Escolha uma opção</option>
                                <option selected>Monitorização</option>
                                <option>Suporte de vida</option>
                                <option>Terapia</option>
                                <option>Diagnóstico</option>
                                <option>Laboratório</option>
                                <option>Esterilização</option>
                                <option>Reabilitação</option>
                            </select>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label for="marca" class="form-label">Marca</label>
                            <input type="text" class="form-control campo-formulario-privado" id="marca" name="marca"
                                value="Philips" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label for="modelo" class="form-label">Modelo</label>
                            <input type="text" class="form-control campo-formulario-privado" id="modelo" name="modelo"
                                value="IntelliVue MP5" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="numero_serie" class="form-label">N.º de série</label>
                            <input type="text" class="form-control campo-formulario-privado" id="numero_serie"
                                name="numero_serie" value="MP5-2022-45873" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label for="fabricante" class="form-label">Fabricante</label>
                            <input type="text" class="form-control campo-formulario-privado" id="fabricante"
                                name="fabricante" value="Philips Healthcare" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label for="ano_fabrico" class="form-label">Ano de fabrico</label>
                            <input type="number" class="form-control campo-formulario-privado" id="ano_fabrico"
                                name="ano_fabrico" min="1900" max="2026" value="2022" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="data_aquisicao" class="form-label">Data de aquisição</label>
                            <input type="date" class="form-control campo-formulario-privado" id="data_aquisicao"
                                name="data_aquisicao" value="2023-04-15" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label for="custo_aquisicao" class="form-label">Custo de aquisição (€)</label>
                            <input type="number" step="0.01" class="form-control campo-formulario-privado"
                                id="custo_aquisicao" name="custo_aquisicao" min="0" value="3200" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label for="tipo_entrada" class="form-label">Tipo de entrada</label>
                            <select class="form-select campo-formulario-privado" id="tipo_entrada" name="tipo_entrada"
                                required>
                                <option value="">Escolha uma opção</option>
                                <option selected>Compra</option>
                                <option>Doação</option>
                                <option>Aluguer</option>
                                <option>Empréstimo</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="estado" class="form-label">Estado atual</label>
                            <select class="form-select campo-formulario-privado" id="estado" name="estado" required>
                                <option value="">Escolha uma opção</option>
                                <option selected>Ativo</option>
                                <option>Inativo</option>
                                <option>Em manutenção</option>
                                <option>Abatido</option>
                                <option>Arquivado</option>
                            </select>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label for="criticidade" class="form-label">Criticidade</label>
                            <select class="form-select campo-formulario-privado" id="criticidade" name="criticidade"
                                required>
                                <option value="">Escolha uma opção</option>
                                <option>Baixa</option>
                                <option>Média</option>
                                <option>Alta</option>
                                <option selected>Suporte de vida</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="observacoes" class="form-label">Observações</label>
                        <textarea class="form-control campo-formulario-privado" id="observacoes" name="observacoes"
                            rows="4">Equipamento utilizado para monitorizar continuamente parâmetros fisiológicos do doente, como frequência cardíaca, saturação de oxigénio, pressão arterial e temperatura.</textarea>
                    </div>

                    <div class="botoes-formulario-privado">
                        <a href="consultar_equipamento.html" id="botao-cancelar-edicao" class="botao-cancelar-privado">
                            <i class="fa-solid fa-xmark"></i>
                            Cancelar
                        </a>

                        <button type="submit" class="botao-guardar-privado">
                            <i class="fa-solid fa-floppy-disk"></i>
                            Guardar alterações
                        </button>
                    </div>

                    <p id="mensagem-editar-equipamento" class="mensagem-login mt-4"></p>

                </form>

            </section>

        </main>

    </div>

    <!-- JavaScript do Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript próprio -->
    <script src="../assets/js/1241466.js"></script>

</body>

</html>
