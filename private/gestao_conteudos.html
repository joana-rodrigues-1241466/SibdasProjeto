<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="1241466">
    <meta name="description" content="Gestão de conteúdos da área pública da MediVault">
    <meta name="keywords" content="MediVault, gestão de conteúdos, área reservada">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MediVault | Gestão de Conteúdos</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS próprio -->
    <link rel="stylesheet" href="../assets/css/1241466.css">
</head>

<body class="pagina-gestao">

    <main class="container py-5">

        <section class="gestao-conteudos">

            <h1 class="titulo-secao text-start">Gestão de Conteúdos</h1>
            <div class="linha-titulo"></div>

            <p class="texto-gestao">
                Nesta área reservada é possível atualizar conteúdos apresentados na área pública da MediVault,
                sem necessidade de editar diretamente o HTML.
            </p>

            <form class="form-gestao-conteudos">

                <!-- HOME -->
                <h2 class="titulo-gestao">Secção Home</h2>

                <div class="mb-3">
                    <label for="editar-home-titulo" class="form-label">Título principal</label>
                    <input type="text" class="form-control campo-contacto" id="editar-home-titulo">
                </div>

                <div class="mb-3">
                    <label for="editar-home-texto" class="form-label">Texto introdutório</label>
                    <textarea class="form-control campo-contacto" id="editar-home-texto" rows="3"></textarea>
                </div>

                <div class="mb-4">
                    <label for="editar-home-botao" class="form-label">Texto do botão</label>
                    <input type="text" class="form-control campo-contacto" id="editar-home-botao">
                </div>

                <!-- SOBRE -->
                <h2 class="titulo-gestao">Secção Sobre</h2>

                <div class="mb-3">
                    <label for="editar-sobre-titulo" class="form-label">Título da secção</label>
                    <input type="text" class="form-control campo-contacto" id="editar-sobre-titulo">
                </div>

                <div class="mb-4">
                    <label for="editar-sobre-texto" class="form-label">Texto principal</label>
                    <textarea class="form-control campo-contacto" id="editar-sobre-texto" rows="4"></textarea>
                </div>

                <!-- FUNCIONALIDADES -->
                <h2 class="titulo-gestao">Secção Funcionalidades</h2>

                <div class="mb-3">
                    <label for="editar-funcionalidades-titulo" class="form-label">Título da secção</label>
                    <input type="text" class="form-control campo-contacto" id="editar-funcionalidades-titulo">
                </div>

                <div class="mb-4">
                    <label for="editar-funcionalidades-texto" class="form-label">Texto introdutório</label>
                    <textarea class="form-control campo-contacto" id="editar-funcionalidades-texto" rows="3"></textarea>
                </div>

                <!-- CONTACTOS -->
                <h2 class="titulo-gestao">Secção Contactos</h2>

                <div class="mb-3">
                    <label for="editar-contactos-titulo" class="form-label">Título da secção</label>
                    <input type="text" class="form-control campo-contacto" id="editar-contactos-titulo">
                </div>

                <div class="mb-4">
                    <label for="editar-contactos-texto" class="form-label">Texto introdutório</label>
                    <textarea class="form-control campo-contacto" id="editar-contactos-texto" rows="3"></textarea>
                </div>

                <!-- RODAPÉ -->
                <h2 class="titulo-gestao">Rodapé</h2>

                <div class="mb-3">
                    <label for="editar-localizacao" class="form-label">Localização</label>
                    <textarea class="form-control campo-contacto" id="editar-localizacao" rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label for="editar-horario" class="form-label">Horário</label>
                    <textarea class="form-control campo-contacto" id="editar-horario" rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label for="editar-email" class="form-label">Email</label>
                    <input type="email" class="form-control campo-contacto" id="editar-email">
                </div>

                <div class="mb-4">
                    <label for="editar-telefone" class="form-label">Telefone</label>
                    <input type="text" class="form-control campo-contacto" id="editar-telefone">
                </div>

                <p id="mensagem-gestao" class="mensagem-login"></p>

                <div class="botoes-gestao">
                    <button type="submit" class="btn botao-principal">
                        Guardar Alterações
                    </button>

                    <button type="button" class="btn botao-secundario-gestao" id="repor-conteudos">
                        Repor Conteúdos Originais
                    </button>
                </div>

            </form>

            <a href="../public/index.html" class="voltar-inicio">
                <i class="fa-solid fa-arrow-left"></i>
                Voltar à página pública
            </a>

        </section>

    </main>

    <!-- JavaScript próprio -->
    <script src="../assets/js/1241466.js"></script>

</body>

</html>
