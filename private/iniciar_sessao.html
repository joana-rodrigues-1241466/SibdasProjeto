<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="1241466">
    <meta name="description" content="Página de login da MediVault">
    <meta name="keywords" content="MediVault, login, inventário hospitalar, equipamentos médicos">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MediVault | Iniciar Sessão</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS próprio -->
    <link rel="stylesheet" href="../assets/css/1241466.css">
</head>

<body class="pagina-login">

    <main class="login-container">

        <section class="login-card">

            <h1 class="login-titulo">Iniciar Sessão</h1>

            <p class="login-subtitulo">
                Acesso reservado a profissionais de saúde autorizados.
            </p>

            <div class="linha-login"></div>

            <form class="form-login">

                <div class="mb-3 text-start">
                    <label for="email-login" class="form-label">Email</label>

                    <div class="input-login">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email-login" name="email" placeholder="exemplo@hospital.pt" required>
                    </div>
                </div>

                <div class="mb-4 text-start">
                    <label for="password-login" class="form-label">Palavra-passe</label>

                    <div class="input-login">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password-login" name="password" placeholder="Insira a sua palavra-passe" required>
                        <i class="fa-regular fa-eye"></i>
                    </div>
                </div>

                <button type="submit" class="btn botao-login-pagina">
                    Entrar
                </button>

            </form>

            <a href="../public/index.html" class="voltar-inicio">
                <i class="fa-solid fa-arrow-left"></i>
                Voltar à página inicial
            </a>

        </section>

    </main>

    <!-- JavaScript próprio -->
    <script src="../assets/js/1241466.js"></script>

</body>

</html>
